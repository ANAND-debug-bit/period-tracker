<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Period Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌸 Period Tracker</h1>

        <div class="card">

            <label>Enter Last Period Date</label>

            <!-- Input for last period date -->
             
            <input type="date" id="lastDate">

            <label>Cycle Length (days)</label>
            <input type="number" id="cycleLength" placeholder="Example: 28">

            <button onclick="calculatePeriod()">
                Track Period
            </button>

        </div>

        <div class="result" id="result">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
